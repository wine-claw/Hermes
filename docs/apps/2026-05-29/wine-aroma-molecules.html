<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Wine Aroma Molecule Explorer</title>
<style>
  :root{ --bg:#0a0a0f; --surface:#14141c; --border:#2a2a3a; --text:#e8e4df; --muted:#9b958e; --accent:#c9a86c; --accent2:#8e6b3d; --accent3:#a8453a; --blue:#4a7ab8; --green:#5a8e5a; --warn-bg:#2a1a10; --warn-border:#5a3a20; --warn-text:#e8b080; }
  html,body{margin:0;padding:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;touch-action:manipulation;}
  canvas{display:block;}
  #canvas-container{position:fixed;inset:0;z-index:0;}

  .disclaimer{position:fixed;top:0;left:0;right:0;background:var(--warn-bg);border-bottom:1px solid var(--warn-border);color:var(--warn-text);padding:0.55rem 1rem;text-align:center;font-size:0.78rem;z-index:200;}
  .disclaimer strong{font-weight:600;}

  /* === DESKTOP: floating panels === */
  #ui-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;display:flex;}
  #ui-layer > *{pointer-events:auto;}
  .panel{position:absolute;background:rgba(16,16,24,0.92);border:1px solid var(--border);border-radius:12px;padding:1rem 1.15rem;backdrop-filter:blur(6px);}
  .panel h2{margin:0 0 0.4rem 0;font-size:0.95rem;color:var(--accent);font-weight:600;}
  .panel h3{margin:0.6rem 0 0.3rem 0;font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
  .panel p{font-size:0.83rem;color:var(--muted);line-height:1.45;margin:0.2rem 0;}

  #molecule-panel{top:52px;left:14px;width:min(260px,calc(100vw - 28px));bottom:auto;max-height:calc(100vh - 70px);overflow-y:auto;}
  .mol-card{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0.7rem;border-radius:8px;border:1px solid transparent;margin-bottom:0.35rem;cursor:pointer;transition:border-color .15s,background .15s;touch-action:manipulation;}
  .mol-card:hover{background:rgba(201,168,108,0.06);}
  .mol-card.active{background:rgba(201,168,108,0.12);border-color:var(--accent);}
  .mol-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .mol-name{font-size:0.82rem;font-weight:500;color:var(--text);line-height:1.2;}
  .mol-sub{font-size:0.72rem;color:var(--muted);}

  #info-panel{top:52px;right:14px;width:min(260px,calc(100vw - 28px));bottom:auto;}
  .info-row{display:flex;justify-content:space-between;font-size:0.78rem;margin:0.3rem 0;color:var(--muted);}
  .info-row .val{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;}
  .bar-wrap{display:flex;align-items:center;gap:0.5rem;margin:0.25rem 0;}
  .bar-label{font-size:0.72rem;color:var(--muted);width:72px;flex-shrink:0;}
  .bar-track{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;width:0%;transition:width .8s cubic-bezier(.2,.8,.2,1);}
  .wine-chips{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.4rem;}
  .chip{font-size:0.72rem;padding:0.18rem 0.55rem;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:var(--muted);}

  #tooltip{position:absolute;background:rgba(10,10,15,0.95);border:1px solid var(--border);border-radius:6px;padding:0.35rem 0.6rem;font-size:0.78rem;color:var(--text);pointer-events:none;opacity:0;transition:opacity .1s;z-index:50;white-space:nowrap;}

  #controls{position:absolute;bottom:14px;left:14px;display:flex;gap:0.5rem;}
  .btn{background:rgba(20,20,28,0.85);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.7rem;border-radius:6px;font-size:0.75rem;cursor:pointer;pointer-events:auto;touch-action:manipulation;backdrop-filter:blur(4px);}
  .btn:hover{border-color:var(--accent);}
  .btn.active{border-color:var(--accent);background:rgba(201,168,108,0.12);}

  #aroma-canvas{width:100%;height:90px;margin-top:0.3rem;border-radius:6px;background:rgba(255,255,255,0.02);}

  /* === MOBILE: bottom bar + drawer === */
  @media(max-width:768px){
    /* disclaimer no longer sticky — it's fixed at top */
    body{overflow:hidden;} /* keep canvas filling screen */

    /* Canvas always fills viewport */
    #canvas-container{position:fixed;inset:0;z-index:0;}

    /* UI layer becomes a bottom bar only */
    #ui-layer{position:fixed;left:0;right:0;bottom:0;top:auto;height:auto;pointer-events:none;z-index:10;display:block;padding:0;}
    #ui-layer > *{pointer-events:auto;}

    /* Desktop panels hidden by default */
    .panel{display:none;}

    /* Bottom bar */
    #mobile-bar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;background:rgba(10,10,15,0.85);border-top:1px solid var(--border);z-index:20;backdrop-filter:blur(8px);pointer-events:auto;}
    #mobile-bar .mol-name-btn{background:rgba(20,20,28,0.9);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.7rem;border-radius:6px;font-size:0.8rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;text-align:left;}
    #mobile-bar .mol-name-btn span{color:var(--accent);font-weight:500;}
    #mobile-bar .bar-btn{background:rgba(20,20,28,0.9);border:1px solid var(--border);color:var(--text);padding:0.35rem 0.55rem;border-radius:6px;font-size:0.75rem;cursor:pointer;flex-shrink:0;}
    #mobile-bar .bar-btn.active{border-color:var(--accent);background:rgba(201,168,108,0.12);}

    /* Slide-up drawer */
    #drawer{position:fixed;left:0;right:0;bottom:0;background:rgba(14,14,22,0.95);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:1rem 1.1rem 5rem;max-height:70vh;overflow-y:auto;transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.8,.2,1);z-index:30;pointer-events:auto;display:none;}
    #drawer.open{display:block;transform:translateY(0);}
    #drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:25;opacity:0;pointer-events:none;transition:opacity .2s;}
    #drawer-backdrop.open{opacity:1;pointer-events:auto;}
    #drawer-close{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:0.2rem;}
    #drawer h2{margin:0 0 0.5rem 0;font-size:0.95rem;color:var(--accent);}
    #drawer h3{margin:0.6rem 0 0.3rem 0;font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
    #drawer p{font-size:0.83rem;color:var(--muted);line-height:1.45;}
    #drawer .info-row{font-size:0.78rem;}
    #drawer .chip{font-size:0.72rem;}
    #drawer .mol-card{margin-bottom:0.3rem;}
    #drawer-mol-list{margin-bottom:0.8rem;}
  }

  /* Scrollbar for molecule panel */
  #molecule-panel::-webkit-scrollbar{width:5px;}
  #molecule-panel::-webkit-scrollbar-track{background:transparent;}
  #molecule-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px;}
  </style>

    <h3>Common in</h3>
    <div class="wine-chips" id="wine-chips"></div>
  </div>

  <div id="controls">
    <button class="btn active" id="btn-rotate">Auto Rotate</button>
    <button class="btn" id="btn-bond">Bond Glow</button>
  </div>

  <!-- Mobile bottom bar -->
  <div id="mobile-bar" style="display:none;">

  </div>

  <div id="drawer-backdrop"></div>
  <div id="drawer">

    <div id="drawer-mol-list"></div>

</div>

<div id="tooltip"></div>

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f, 1);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 3;
controls.maxDistance = 18;

/* Lighting */
const ambient = new THREE.AmbientLight(0x404050, 1.8);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffeedd, 2.5);
keyLight.position.set(5, 8, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x88aaff, 0.8);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

const rim = new THREE.PointLight(0xc9a86c, 2.0, 20);
rim.position.set(0, -3, 6);
scene.add(rim);

const back = new THREE.PointLight(0x883333, 1.5, 20);
back.position.set(0, 4, -8);
scene.add(back);

/* Background particles */
const partGeo = new THREE.BufferGeometry();
const partCount = 400;
const pPos = new Float32Array(partCount * 3);
for (let i = 0; i < partCount * 3; i++) pPos[i] = (Math.random() - 0.5) * 30;
partGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const partMat = new THREE.PointsMaterial({ color: 0x665544, size: 0.04, transparent: true, opacity: 0.5 });
scene.add(new THREE.Points(partGeo, partMat));

/* Current molecule group */
let currentMolGroup = new THREE.Group();
scene.add(currentMolGroup);
let currentHover = null;
let bondGlowEnabled = true;
let autoRotate = true;

/* Raycaster */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-99, -99);
const tooltip = document.getElementById('tooltip');

/* Build molecule mesh from data */
function buildMolecule(mol){
  scene.remove(currentMolGroup);
  currentMolGroup = new THREE.Group();

  // Center atoms
  let cx = 0, cy = 0, cz = 0;
  for (const a of mol.atoms) { cx += a.x; cy += a.y; cz += a.z; }
  cx /= mol.atoms.length; cy /= mol.atoms.length; cz /= mol.atoms.length;

  const atomMeshes = [];
  for (const a of mol.atoms) {
    const spec = ATOM[a.type];
    const geo = new THREE.SphereGeometry(spec.radius, 28, 20);
    const mat = new THREE.MeshPhysicalMaterial({
      color: spec.color, metalness: 0.1, roughness: 0.3,
      clearcoat: 0.6, clearcoatRoughness: 0.2,
      emissive: spec.color, emissiveIntensity: 0.15
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(a.x - cx, a.y - cy, a.z - cz);
    mesh.userData = { atomType: a.type, atomName: spec.name };
    currentMolGroup.add(mesh);
    atomMeshes.push(mesh);
  }

  for (const b of mol.bonds) {
    const a1 = mol.atoms[b[0]], a2 = mol.atoms[b[1]];
    if (!a1 || !a2) continue;
    const p1 = new THREE.Vector3(a1.x - cx, a1.y - cy, a1.z - cz);
    const p2 = new THREE.Vector3(a2.x - cx, a2.y - cy, a2.z - cz);
    const len = p1.distanceTo(p2);
    const mid = p1.clone().add(p2).multiplyScalar(0.5);
    const geo = new THREE.CylinderGeometry(0.07, 0.07, len, 12);
    const mat = new THREE.MeshStandardMaterial({
      color: bondGlowEnabled ? 0x887766 : 0x554433,
      metalness: 0.6, roughness: 0.4,
      emissive: bondGlowEnabled ? 0x332211 : 0x000000, emissiveIntensity: bondGlowEnabled ? 0.4 : 0
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(mid);
    mesh.lookAt(p2);
    mesh.rotateX(Math.PI / 2);
    currentMolGroup.add(mesh);
  }

  scene.add(currentMolGroup);
}

/* UI builders */
function createMolList(){
  const el = document.getElementById('mol-list');
  el.innerHTML = '';
  for (const m of MOLECULES) {
    const card = document.createElement('div');
    card.className = 'mol-card' + (m.key === (currentKey||'') ? ' active' : '');
    card.dataset.key = m.key;
    card.innerHTML = `<div class="mol-dot" style="background:rgba(201,168,108,0.8);"></div><div><div class="mol-name">${m.name}</div><div class="mol-sub">${m.formula}</div></div>`;
    card.addEventListener('click', () => selectMolecule(m.key));
    el.appendChild(card);
  }
}

function drawAromaCanvas(profile){
  const c = document.getElementById('aroma-canvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio, 2);
  const w = c.clientWidth * dpr, h = c.clientHeight * dpr;
  if (c.width !== w) { c.width = w; c.height = h; }
  ctx.clearRect(0, 0, w, h);
  ctx.scale(dpr, dpr);
  const cols = {
    floral:  '#c084a0',
    fruity:  '#d4a06a',
    spicy:   '#c95a3a',
    oaky:    '#8e6b3d',
    herbal:  '#5a8e5a',
    earthy:  '#7a6a5a'
  };
  const labels = {floral:'Floral',fruity:'Fruity',spicy:'Spicy',oaky:'Oak/Toast',herbal:'Herbal',earthy:'Earthy'};
  const keys = Object.keys(profile);
  const pad = 10, cw = c.clientWidth - pad*2, ch = c.clientHeight;
  const barW = (cw - (keys.length-1)*6) / keys.length;
  keys.forEach((k,i)=>{
    const v = profile[k];
    const x = pad + i*(barW+6);
    const bh = (ch - 18) * v;
    const y = ch - 14 - bh;
    // bar
    const grad = ctx.createLinearGradient(0, y, 0, y+bh);
    grad.addColorStop(0, cols[k] + 'cc');
    grad.addColorStop(1, cols[k] + '44');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bh, 3);
    ctx.fill();
    // label
    ctx.fillStyle = '#9b958e';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(labels[k].split(' ')[0], x + barW/2, ch - 3);
  });
  ctx.setTransform(1,0,0,1,0,0);
}

function buildInfoPanel(mol){
  document.getElementById('mol-title').textContent = mol.name;
  document.getElementById('mol-desc').textContent = mol.desc;
  document.getElementById('mol-formula').textContent = mol.formula;
  document.getElementById('mol-threshold').textContent = mol.threshold;
  document.getElementById('mol-mw').textContent = mol.mw;

  const chips = document.getElementById('wine-chips');
  chips.innerHTML = mol.wineTypes.map(t => `<span class="chip">${t}</span>`).join('');

  drawAromaCanvas(mol.aromaProfile);
}

let currentKey = null;
function selectMolecule(key){
  currentKey = key;
  const mol = MOLECULES.find(m => m.key === key);
  if (!mol) return;
  buildMolecule(mol);
  buildInfoPanel(mol);
  createMolList(); // refresh active state
  updateMobileBar(); // update mobile bottom bar text

  // Reset camera slightly for drama
  camera.position.set(0, 2, 10);
  controls.target.set(0,0,0);
  controls.update();
}

/* Controls */
const btnRotate = document.getElementById('btn-rotate');
const btnBond = document.getElementById('btn-bond');

btnRotate.addEventListener('click', ()=>{
  autoRotate = !autoRotate;
  btnRotate.classList.toggle('active', autoRotate);
});
btnBond.addEventListener('click', ()=>{
  bondGlowEnabled = !bondGlowEnabled;
  btnBond.classList.toggle('active', bondGlowEnabled);
  const mol = MOLECULES.find(m => m.key === currentKey);
  if (mol) buildMolecule(mol);
});

/* ===== MOBILE BOTTOM BAR + DRAWER ===== */
const mobileBar = document.getElementById('mobile-bar');
const mobileRotate = document.getElementById('mobile-rotate');
const mobileBond = document.getElementById('mobile-bond');
const mobileInfo = document.getElementById('mobile-info');
const mobileMolBtn = document.getElementById('mobile-mol-btn');
const mobileMolName = document.getElementById('mobile-mol-name');
const drawer = document.getElementById('drawer');
const drawerBackdrop = document.getElementById('drawer-backdrop');
const drawerClose = document.getElementById('drawer-close');
const drawerMolList = document.getElementById('drawer-mol-list');
const drawerInfo = document.getElementById('drawer-info');

function isMobile(){ return window.innerWidth <= 768; }

function openDrawer(mode){
  drawer.classList.add('open');
  drawerBackdrop.classList.add('open');
  drawerMolList.innerHTML = '';
  drawerInfo.innerHTML = '';
  if (mode === 'molecules') {
    drawerMolList.innerHTML = document.getElementById('mol-list').innerHTML;
    // Re-bind click handlers on cloned cards
    drawerMolList.querySelectorAll('.mol-card').forEach(card => {
      card.addEventListener('click', () => selectMolecule(card.dataset.key));
    });
  } else if (mode === 'info') {
    const mol = MOLECULES.find(m => m.key === currentKey);
    if (!mol) return;
    drawerInfo.innerHTML = `
      <h2>${mol.name}</h2>
      <p>${mol.desc}</p>
      <div class="info-row"><span>Formula</span><span class="val">${mol.formula}</span></div>
      <div class="info-row"><span>Threshold</span><span class="val">${mol.threshold}</span></div>
      <div class="info-row"><span>MW</span><span class="val">${mol.mw}</span></div>
      <h3>Aroma Profile</h3>
      <div style="height:90px;" id="drawer-aroma-wrap"></div>
      <h3>Common in</h3>
      <div class="wine-chips">${mol.wineTypes.map(t => `<span class="chip">${t}</span>`).join('')}</div>
    `;
    // Draw aroma chart on a new canvas
    const wrap = document.getElementById('drawer-aroma-wrap');
    if (wrap) {
      const c = document.createElement('canvas');
      c.width = wrap.clientWidth * 2;
      c.height = 180;
      c.style.width = '100%';
      c.style.height = '90px';
      wrap.appendChild(c);
      drawAromaCanvasOn(c, mol.aromaProfile, wrap.clientWidth, 90);
    }
  }
}

function closeDrawer(){
  drawer.classList.remove('open');
  drawerBackdrop.classList.remove('open');
}

drawerClose.addEventListener('click', closeDrawer);
drawerBackdrop.addEventListener('click', closeDrawer);

mobileRotate.addEventListener('click', ()=>{
  autoRotate = !autoRotate;
  mobileRotate.classList.toggle('active', autoRotate);
  if (btnRotate) btnRotate.classList.toggle('active', autoRotate);
});
mobileBond.addEventListener('click', ()=>{
  bondGlowEnabled = !bondGlowEnabled;
  mobileBond.classList.toggle('active', bondGlowEnabled);
  if (btnBond) btnBond.classList.toggle('active', bondGlowEnabled);
  const mol = MOLECULES.find(m => m.key === currentKey);
  if (mol) buildMolecule(mol);
});
mobileMolBtn.addEventListener('click', ()=> openDrawer('molecules'));
mobileInfo.addEventListener('click', ()=> openDrawer('info'));

function updateMobileBar(){
  if (!isMobile()) {
    if (mobileBar) mobileBar.style.display = 'none';
    closeDrawer();
    return;
  }
  if (mobileBar) mobileBar.style.display = 'flex';
  const mol = MOLECULES.find(m => m.key === currentKey);
  if (mol && mobileMolName) mobileMolName.textContent = mol.name;
}

function drawAromaCanvasOn(c, profile, cw, ch){
  const ctx = c.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio, 2);
  c.width = cw * dpr;
  c.height = ch * dpr;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.scale(dpr, dpr);
  const cols = {
    floral:  '#c084a0', fruity:  '#d4a06a', spicy:   '#c95a3a',
    oaky:    '#8e6b3d', herbal:  '#5a8e5a', earthy:  '#7a6a5a'
  };
  const labels = {floral:'Floral',fruity:'Fruity',spicy:'Spicy',oaky:'Oak/Toast',herbal:'Herbal',earthy:'Earthy'};
  const keys = Object.keys(profile);
  const pad = 10, barW = (cw - pad*2 - (keys.length-1)*6) / keys.length;
  keys.forEach((k,i)=>{
    const v = profile[k];
    const x = pad + i*(barW+6);
    const bh = (ch - 18) * v;
    const y = ch - 14 - bh;
    const grad = ctx.createLinearGradient(0, y, 0, y+bh);
    grad.addColorStop(0, cols[k] + 'cc');
    grad.addColorStop(1, cols[k] + '44');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, bh, 3);
    ctx.fill();
    ctx.fillStyle = '#9b958e';
    ctx.font = '9px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(labels[k].split(' ')[0], x + barW/2, ch - 3);
  });
  ctx.setTransform(1,0,0,1,0,0);
}

window.addEventListener('resize', ()=>{
  updateMobileBar();
});

/* Mouse events */
function onMouseMove(e){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(currentMolGroup.children);
  const atomHit = intersects.find(i => i.object.userData && i.object.userData.atomName);
  if (atomHit) {
    tooltip.style.opacity = '1';
    tooltip.textContent = atomHit.object.userData.atomName;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    if (currentHover !== atomHit.object) {
      if (currentHover) currentHover.material.emissiveIntensity = 0.15;
      currentHover = atomHit.object;
      currentHover.material.emissiveIntensity = 0.6;
    }
  } else {
    tooltip.style.opacity = '0';
    if (currentHover) {
      currentHover.material.emissiveIntensity = 0.15;
      currentHover = null;
    }
  }
}
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('touchmove', (e)=>{
  if (e.touches.length === 1) {
    const t = e.touches[0];
    onMouseMove({ clientX: t.clientX, clientY: t.clientY });
  }
}, { passive: true });

/* Resize */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (currentKey) {
    const mol = MOLECULES.find(m => m.key === currentKey);
    if (mol) drawAromaCanvas(mol.aromaProfile);
  }
});

/* Animation loop */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  if (autoRotate && currentMolGroup) {
    currentMolGroup.rotation.y += 0.004;
    currentMolGroup.rotation.x = Math.sin(t * 0.3) * 0.12;
  }

  // Animate background particles
  const positions = scene.children.find(c => c.isPoints)?.geometry.attributes.position;
  if (positions) {
    for (let i = 0; i < partCount; i++) {
      let y = positions.getY(i);
      y += Math.sin(t * 0.2 + i * 0.1) * 0.003;
      positions.setY(i, y);
    }
    positions.needsUpdate = true;
  }

  renderer.render(scene, camera);
}
animate();

/* Init */
selectMolecule('vanillin');
updateMobileBar();
</script>
</body>
</html>
