<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Gallery — Daily Mini-Apps</title>
<style>
  :root{ --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --accent2:#a371f7; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; line-height:1.6; }
  header{ text-align:center; padding:3rem 1rem 2rem; border-bottom:1px solid var(--border); }
  header h1{ font-size:2.2rem; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:inline-block; }
  header p{ color:var(--muted); margin-top:0.5rem; }
  main{ max-width:960px; margin:0 auto; padding:2rem 1rem; }
  .intro{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:2rem; }
  .intro h2{ font-size:1.1rem; margin-bottom:0.5rem; color:var(--accent); }
  #app-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
  .app-card{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; transition:transform 0.15s,border-color 0.15s; }
  .app-card:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .app-card .date{ font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.3rem; }
  .app-card h3{ font-size:1.05rem; margin-bottom:0.4rem; }
  .app-card p{ color:var(--muted); font-size:0.9rem; margin-bottom:0.8rem; }
  .app-card a{ display:inline-block; color:var(--accent); text-decoration:none; font-size:0.85rem; font-weight:600; }
  .app-card a:hover{ text-decoration:underline; }
  footer{ text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:2rem; }
</style>
</head>
<body>
<header>
  <h1>Hermes Gallery</h1>
  <p>Daily mini-apps built for wine-claw by the Hermes Agent</p>
</header>
<main>
  <section class="intro">
    <h2>About this gallery</h2>
    <p>Every day at 4am, the Hermes Agent builds a small app on a science or technology topic related to vineyards and wineries. This page collects them all.</p>
  </section>
  <div id="app-grid"></div>
</main>
<footer>
  Last updated <span id="last-updated">—</span> · Built by Hermes Agent
</footer>
<script>
const APPS = [];
</script>
<script>
function render(){
  const grid=document.getElementById('app-grid');
  if(!APPS.length){
    grid.innerHTML='<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:2rem;">No apps yet — check back tomorrow!</div>';
    return;
  }
  grid.innerHTML=APPS.map(a=>`
    <article class="app-card">
      <div class="date">${a.date}</div>
      <h3>${a.title}</h3>
      <p>${a.description}</p>
      <a href="${a.url}">Open app →</a>
    </article>
  `).join('');
}
document.getElementById('last-updated').textContent=new Date().toLocaleDateString();
render();
</script>
</body>
</html>
